<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Featured projects by Motasem Kadry — showcasing web development work and creative builds.">
  <title>Projects — Motasem Kadry</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: { extend: { fontFamily: { display: ['Space Grotesk', 'sans-serif'], mono: ['Space Mono', 'monospace'] } } }
    };
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">

  <!-- Page-specific styles -->
  <style>
    .project-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      position: relative;
      overflow: hidden;
      transition: transform 0.4s ease, border-color 0.3s ease;
    }
    .project-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--accent), var(--danger));
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.4s ease;
    }
    .project-card:hover { transform: translateY(-8px); border-color: var(--accent); }
    .project-card:hover::before { transform: scaleX(1); }

    .placeholder-box {
      border: 1px dashed var(--border);
      background: rgba(255, 255, 255, 0.02);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      font-family: 'Space Mono', monospace;
      font-size: 0.875rem;
      transition: all 0.3s ease;
    }
    .placeholder-box:hover { border-color: var(--muted); background: rgba(255, 255, 255, 0.03); }
  </style>
</head>

<body class="bg-grid">
  <div class="cursor-follower" id="cursor" aria-hidden="true"></div>
  <div class="orb orb-1" aria-hidden="true"></div>
  <div class="orb orb-2" aria-hidden="true"></div>

  <!-- Navigation -->
  <nav class="fixed top-0 left-0 right-0 z-50 backdrop-blur-md bg-[rgba(10,10,11,0.8)] border-b border-[var(--border)]" id="mainNav">
    <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
      <a href="index.html" class="font-mono text-lg font-bold tracking-tight" aria-label="Home">
        <span class="text-[var(--accent)]">&lt;</span>MK<span class="text-[var(--accent)]">/&gt;</span>
      </a>
      <div class="hidden md:flex items-center gap-8">
        <a href="about.html" class="nav-link font-mono text-sm">About</a>
        <a href="skills.html" class="nav-link font-mono text-sm">Skills</a>
        <a href="skills.html#roadmap" class="nav-link font-mono text-sm">Roadmap</a>
        <a href="projects.html" class="nav-link font-mono text-sm">Projects</a>
        <a href="contact.html" class="btn-primary text-sm">Let's Talk</a>
      </div>
      <button class="md:hidden p-2" id="menuBtn" aria-label="Toggle menu">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="3" y1="6" x2="21" y2="6"></line>
          <line x1="3" y1="12" x2="21" y2="12"></line>
          <line x1="3" y1="18" x2="21" y2="18"></line>
        </svg>
      </button>
    </div>
  </nav>

  <!-- Mobile Menu -->
  <div class="mobile-menu fixed inset-0 z-40 bg-[var(--bg)] flex flex-col items-center justify-center gap-8 md:hidden" id="mobileMenu">
    <a href="about.html" class="text-2xl font-mono">About</a>
    <a href="skills.html" class="text-2xl font-mono">Skills</a>
    <a href="skills.html#roadmap" class="text-2xl font-mono">Roadmap</a>
    <a href="projects.html" class="text-2xl font-mono">Projects</a>
    <a href="contact.html" class="btn-primary mt-4">Let's Talk</a>
  </div>

  <!-- Projects -->
  <section class="py-32 relative">
    <div class="max-w-7xl mx-auto px-6">
      <div class="reveal page-header text-center">
        <p class="font-mono text-[var(--accent)] text-sm mb-2">// Projects</p>
        <h2 class="text-4xl sm:text-5xl font-bold">Featured Work</h2>
      </div>

      <div class="grid md:grid-cols-2 gap-8">
        <div class="reveal project-card placeholder-box min-h-[300px] flex flex-col items-center justify-center gap-4 p-8 text-center rounded-lg">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" class="opacity-20">
            <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z" />
            <line x1="12" y1="11" x2="12" y2="17" />
            <line x1="9" y1="14" x2="15" y2="14" />
          </svg>
          <p class="text-sm opacity-50">Add Your First Project</p>
        </div>

        <div class="reveal project-card placeholder-box min-h-[300px] flex flex-col items-center justify-center gap-4 p-8 text-center rounded-lg">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" class="opacity-20">
            <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z" />
            <line x1="12" y1="11" x2="12" y2="17" />
            <line x1="9" y1="14" x2="15" y2="14" />
          </svg>
          <p class="text-sm opacity-50">Add Your Second Project</p>
        </div>
      </div>
    </div>
  </section>

  <footer class="py-8 border-t border-[var(--border)]">
    <div class="max-w-7xl mx-auto px-6 flex flex-col sm:flex-row items-center justify-between gap-4">
      <p class="text-[var(--muted)] text-sm">Designed & Built by Motasem Kadry</p>
      <p class="text-[var(--muted)] text-sm font-mono">&copy; 2024 All rights reserved</p>
    </div>
  </footer>

  <script src="js/main.js"></script>
</body>
</html>
